<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת השקעות - יוסטון, טקסס</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; direction: ltr; }

        /* Sidebar */
        #sidebar {
            width: 340px;
            min-width: 340px;
            background: #1a1a2e;
            color: #eee;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
        #sidebar-header {
            padding: 24px 20px 16px;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            border-bottom: 2px solid #e94560;
        }
        #sidebar-header h1 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 4px;
        }
        #sidebar-header p {
            font-size: 12px;
            color: #aaa;
            direction: rtl;
        }
        .section-title {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: #e94560;
            padding: 16px 20px 8px;
            font-weight: 700;
            direction: rtl;
            text-align: right;
        }
        .community-card {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .community-card:hover {
            background: rgba(233, 69, 96, 0.1);
        }
        .community-card.active {
            background: rgba(233, 69, 96, 0.2);
            border-right: 3px solid #e94560;
        }
        .community-card h3 {
            font-size: 15px;
            color: #fff;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .community-card h3 .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .community-card .area {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            direction: rtl;
            text-align: right;
        }
        .community-card .drive-time {
            font-size: 11px;
            color: #e94560;
            margin-bottom: 4px;
            direction: rtl;
            text-align: right;
        }
        .community-card .details {
            font-size: 12px;
            color: #bbb;
            line-height: 1.5;
            direction: rtl;
            text-align: right;
        }
        .community-card .tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(233,69,96,0.2);
            color: #e94560;
            margin-top: 6px;
            margin-left: 4px;
        }
        .landmark-item {
            padding: 8px 20px;
            font-size: 13px;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .landmark-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .landmark-item .icon { font-size: 16px; width: 24px; text-align: center; }

        /* Map */
        #map { flex: 1; height: 100%; }

        /* Custom popup */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .leaflet-popup-content {
            margin: 0;
            min-width: 280px;
        }
        .popup-header {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            color: #fff;
            padding: 14px 16px;
            border-radius: 12px 12px 0 0;
        }
        .popup-header h3 { font-size: 16px; margin-bottom: 2px; }
        .popup-header .sub { font-size: 12px; color: #aaa; }
        .popup-body { padding: 12px 16px 14px; }
        .popup-body p { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 8px; direction: rtl; text-align: right; }
        .popup-body .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .popup-body .info-row .label { color: #999; direction: rtl; }
        .popup-body .info-row .value { color: #333; font-weight: 600; direction: rtl; text-align: left; }
        .popup-body .popup-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .popup-body .lennar-link {
            display: inline-block;
            font-size: 12px;
            color: #0f3460;
            text-decoration: none;
            font-weight: 600;
        }
        .popup-body .lennar-link:hover { text-decoration: underline; }
        .popup-body .aerial-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 5px 12px;
            background: linear-gradient(135deg, #16213e, #0f3460);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .popup-body .aerial-btn:hover { opacity: 0.85; transform: scale(1.02); }

        /* Aerial modal */
        .aerial-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .aerial-modal-overlay.active { display: flex; }
        .aerial-modal {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            width: 700px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .aerial-modal-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            color: #fff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .aerial-modal-header h3 { font-size: 16px; }
        .aerial-modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.7;
        }
        .aerial-modal-close:hover { opacity: 1; }
        #aerial-map {
            width: 100%;
            height: 420px;
        }
        .aerial-modal-footer {
            padding: 10px 20px;
            font-size: 12px;
            color: #888;
            text-align: center;
            background: #f8f8f8;
            direction: rtl;
        }

        /* Drive time label on map */
        .drive-label {
            background: rgba(26, 26, 46, 0.85);
            color: #eee;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Community name labels */
        .community-label {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(0,0,0,1), 0 0 16px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        /* Houston city label */
        .houston-label {
            background: none;
            border: none;
            color: rgba(233, 69, 96, 0.85);
            font-size: 44px;
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 12px rgba(0,0,0,0.7), 0 0 24px rgba(0,0,0,0.4);
            letter-spacing: 5px;
        }

        /* Employer name labels */
        .employer-label {
            background: rgba(230, 126, 34, 0.95);
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            white-space: nowrap;
            padding: 4px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 0.3px;
        }

        /* Ring labels */
        .ring-label {
            background: none;
            border: none;
            color: rgba(15, 52, 96, 0.45);
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Layer control */
        .map-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 999;
            display: flex;
            gap: 6px;
        }
        .map-btn {
            padding: 8px 14px;
            background: rgba(26, 26, 46, 0.85);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .map-btn:hover { background: rgba(40, 40, 70, 0.9); color: #fff; }
        .map-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 24px;
            right: 12px;
            z-index: 999;
            background: rgba(26, 26, 46, 0.92);
            border-radius: 14px;
            padding: 28px 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .legend h4 { font-size: 26px; margin-bottom: 18px; color: #fff; font-weight: 800; }
        .legend-item { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; color: #ddd; font-size: 20px; font-weight: 600; }
        .legend-dot { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
        .legend-line { width: 36px; height: 0; border-top: 3px dashed; }
        .legend-ring { width: 26px; height: 26px; border-radius: 50%; border: 2px dashed rgba(200,200,255,0.5); }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; min-width: unset; height: 40vh; order: 2; }
            #map { height: 60vh; order: 1; }

            /* Legend - shrink to fit mobile */
            .legend { padding: 12px 16px; bottom: 8px; right: 8px; border-radius: 10px; }
            .legend h4 { font-size: 14px; margin-bottom: 8px; }
            .legend-item { font-size: 12px; gap: 8px; margin-bottom: 6px; }
            .legend-dot { width: 14px; height: 14px; }

            /* Map labels - smaller for mobile */
            .houston-label { font-size: 22px; letter-spacing: 2px; }
            .community-label { font-size: 14px; }
            .employer-label { font-size: 10px; padding: 2px 6px; }

            /* Map controls */
            .map-btn { padding: 5px 10px; font-size: 11px; }
            .map-controls { top: 8px; right: 8px; gap: 4px; }

            /* Sidebar compact */
            #sidebar-header { padding: 16px 14px 10px; }
            #sidebar-header h1 { font-size: 16px; }
            .community-card { padding: 10px 14px; }
            .community-card h3 { font-size: 13px; }
            .community-card .area, .community-card .details { font-size: 11px; }

            /* Aerial modal */
            .aerial-modal { width: 95vw; }
            .aerial-modal-header h3 { font-size: 13px; }
            #aerial-map { height: 280px; }
            .aerial-modal-footer { font-size: 11px; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <h1>מפת השקעות - יוסטון TX</h1>
            <p>שכונות Lennar להשקעה באזור יוסטון, טקסס</p>
        </div>

        <div class="section-title">שכונות יעד</div>
        <div id="community-list"></div>

        <div class="section-title">מעסיקים ותעשייה</div>
        <div id="employer-list"></div>

        <div class="section-title">ציוני דרך</div>
        <div id="landmark-list"></div>
    </div>

    <div id="map" style="position: relative;">
        <div class="map-controls">
            <button class="map-btn active" onclick="setLayer('street')">מפה</button>
            <button class="map-btn" onclick="setLayer('satellite')">לוויין</button>
        </div>
        <div class="legend">
            <h4>מקרא</h4>
            <div class="legend-item"><div class="legend-dot" style="background:#e94560"></div> שכונות Lennar</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> מעסיקים ותעשייה</div>
            <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div> ציוני דרך</div>
        </div>
    </div>

    <!-- Aerial Photo Modal -->
    <div class="aerial-modal-overlay" id="aerialOverlay">
        <div class="aerial-modal">
            <div class="aerial-modal-header">
                <h3 id="aerialTitle"></h3>
                <button class="aerial-modal-close" onclick="closeAerial()">&times;</button>
            </div>
            <div id="aerial-map"></div>
            <div class="aerial-modal-footer" id="aerialFooter"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ========== DATA ==========
    const HOUSTON_CENTER = [29.7604, -95.3698];

    const communities = [
        {
            id: 'crosby',
            name: 'Crosby',
            nameHe: 'קרוסבי',
            area: 'מזרח יוסטון',
            lat: 29.9119,
            lng: -95.0624,
            color: '#e94560',
            builder: 'Lennar',
            communities: 'Indian Springs, Sweetgrass Village, Newport Preserve, Crosby Farms',
            priceRange: '$237K - $320K',
            schoolDistrict: 'Crosby ISD',
            description: 'מזרח יוסטון. קרבה לנמל יוסטון ו-Lake Houston. גישה נוחה ל-I-90 ולהרחבת Grand Parkway. מחירים אטרקטיביים עם פוטנציאל צמיחה גבוה.',
            highlights: ['קרבה ל-Lake Houston', 'הרחבת Grand Parkway', 'גישה לנמל יוסטון'],
            url: 'https://www.lennar.com/new-homes/texas/houston/crosby',
            driveTime: '~30 דקות',
            driveMinutes: 30,
            aerialLat: 29.9456,
            aerialLng: -95.1066,
            aerialZoom: 17,
            aerialNote: 'שכונת Synova בקרוסבי - בתים חדשים בבנייה (Autumn Hts Ln)'
        },
        {
            id: 'anniston',
            name: 'Anniston',
            nameHe: 'אניסטון',
            area: 'קייטי, מערב יוסטון',
            lat: 29.8485,
            lng: -95.8180,
            color: '#f39c12',
            builder: 'Lennar',
            communities: 'Anniston (5 collections, 16 floor plans)',
            priceRange: '$268K - $510K',
            schoolDistrict: 'Katy ISD',
            description: 'מערב יוסטון, באזור Katy. שכונה מתוכננת חדשה עם אגם, מרכז פנאי ובריכה. קרבה ל-SH-99 ו-I-10. בתי ספר מצוינים של Katy ISD.',
            highlights: ['בתי ספר Katy ISD', 'אגם + מרכז פנאי', 'קרבה ל-I-10 ו-SH-99'],
            url: 'https://www.lennar.com/new-homes/texas/houston/katy/anniston',
            driveTime: '~35 דקות',
            driveMinutes: 35,
            aerialLat: 29.8693,
            aerialLng: -95.8357,
            aerialZoom: 17,
            aerialNote: 'שכונת Anniston בקייטי - בנייה חדשה באזור Harvest Wheat Ln'
        },
        {
            id: 'sila',
            name: 'Sila',
            nameHe: 'סילה',
            area: 'האפמן, צפון-מזרח יוסטון',
            lat: 30.0455,
            lng: -95.1080,
            color: '#2ecc71',
            builder: 'Lennar',
            communities: 'Sila (Cottage, Wellton, Avante Collections)',
            priceRange: '$250K - $380K',
            schoolDistrict: 'Huffman ISD',
            description: 'צפון-מזרח יוסטון, באזור Huffman. שכונה ביער עם שבילי הליכה, בריכה ומגרש פיקלבול. גישה נוחה ל-I-69.',
            highlights: ['נוף יער', 'בריכה + פיקלבול', 'קרבה ל-I-69'],
            url: 'https://www.lennar.com/new-homes/texas/houston/huffman/sila',
            driveTime: '~35 דקות',
            driveMinutes: 35,
            aerialLat: 30.1269,
            aerialLng: -95.1176,
            aerialZoom: 17,
            aerialNote: 'שכונת Sila בהאפמן - בנייה חדשה בתוך שטחי יער (Prunella Ln)'
        },
        {
            id: 'new-caney',
            name: 'New Caney',
            nameHe: 'ניו קייני',
            area: 'צפון יוסטון',
            lat: 30.1528,
            lng: -95.1942,
            color: '#9b59b6',
            builder: 'Lennar',
            communities: 'The Trails, Tavola, Tavola West, Pinewood at Grand Texas',
            priceRange: '$230K - $350K',
            schoolDistrict: 'New Caney ISD',
            description: 'צפון יוסטון. מספר קהילות גדולות כולל Tavola (1,560 דונם). קרבה ל-Valley Ranch Town Center, Big Rivers Water Park ו-US-59.',
            highlights: ['תכנית Tavola - 1,560 דונם', 'Valley Ranch Town Center', 'גישה ל-Grand Parkway'],
            url: 'https://www.lennar.com/new-homes/texas/houston/new-caney',
            driveTime: '~40 דקות',
            driveMinutes: 40,
            aerialLat: 30.1713,
            aerialLng: -95.2178,
            aerialZoom: 17,
            aerialNote: 'שכונת Tavola West בניו קייני - בתים חדשים בבנייה (Via Aurelia Dr)'
        }
    ];

    // ========== EMPLOYERS & INDUSTRY ==========
    const employers = [
        {
            name: 'Apple AI Manufacturing',
            nameHe: 'מפעל Apple AI',
            icon: '🍎',
            lat: 29.870,
            lng: -95.545,
            desc: 'מפעל ייצור שרתי AI ו-Mac Mini של Apple. 500,000 רגל רבוע, אלפי עובדים. השקעה של $600B בארה"ב.',
            type: 'טכנולוגיה'
        },
        {
            name: 'HPE Global HQ',
            nameHe: 'מטה עולמי HPE',
            icon: '💻',
            lat: 30.017,
            lng: -95.461,
            desc: 'מטה עולמי של Hewlett Packard Enterprise. עבר מסיליקון ואלי ב-2022. קמפוס 440,000 רגל רבוע ב-Springwoods Village.',
            type: 'טכנולוגיה'
        },
        {
            name: 'ExxonMobil Campus',
            nameHe: 'קמפוס ExxonMobil',
            icon: '🛢️',
            lat: 30.0667,
            lng: -95.3981,
            desc: 'מטה ExxonMobil בספרינג. אחת מחברות האנרגיה הגדולות בעולם. 10,000+ עובדים באתר.',
            type: 'אנרגיה'
        },
        {
            name: 'Energy Corridor',
            nameHe: 'מסדרון האנרגיה',
            icon: '⚡',
            lat: 29.7724,
            lng: -95.5609,
            desc: 'ריכוז מטות של BP, Shell, ConocoPhillips, Phillips 66 ועוד. מעל 90,000 עובדים באזור.',
            type: 'אנרגיה'
        },
        {
            name: 'Houston Ship Channel',
            nameHe: 'תעלת הספנות / פטרוכימיה',
            icon: '🏭',
            lat: 29.737,
            lng: -95.013,
            desc: 'אזור תעשייה פטרוכימי עצום. 44% מכלל ייצור הפטרוכימיה בארה"ב. מאות מפעלים.',
            type: 'תעשייה'
        },
        {
            name: 'Texas Medical Center',
            nameHe: 'המרכז הרפואי של טקסס',
            icon: '🏥',
            lat: 29.7066,
            lng: -95.3975,
            desc: 'המרכז הרפואי הגדול בעולם. 106,000+ עובדים. כולל 60 מוסדות רפואיים.',
            type: 'רפואה'
        },
    ];

    const landmarks = [
        { name: 'מרכז יוסטון (Downtown)', icon: '🏙️', lat: 29.7604, lng: -95.3698 },
        { name: 'NASA / מרכז החלל ג\'ונסון', icon: '🚀', lat: 29.5519, lng: -95.0930 },
        { name: 'The Woodlands', icon: '🌲', lat: 30.1658, lng: -95.4613 },
        { name: 'Katy (קייטי)', icon: '📍', lat: 29.7858, lng: -95.8245 },
        { name: 'Sugar Land', icon: '📍', lat: 29.6197, lng: -95.6349 },
        { name: 'נמל תעופה IAH', icon: '✈️', lat: 29.9902, lng: -95.3368 },
    ];

    // ========== MAP SETUP ==========
    const map = L.map('map', {
        center: [29.95, -95.35],
        zoom: 10,
        zoomControl: false
    });

    // Auto-fit to show all communities
    const communityBounds = L.latLngBounds(communities.map(c => [c.lat, c.lng]));
    communityBounds.extend(HOUSTON_CENTER);
    map.fitBounds(communityBounds, { padding: [30, 30] });

    L.control.zoom({ position: 'topleft' }).addTo(map);

    const streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        maxZoom: 19
    });

    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri',
        maxZoom: 19
    });

    const labelsLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    });

    streetLayer.addTo(map);
    let currentLayer = 'street';

    function setLayer(type) {
        document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
        if (type === 'satellite') {
            map.removeLayer(streetLayer);
            map.removeLayer(labelsLayer);
            satelliteLayer.addTo(map);
            labelsLayer.addTo(map);
            document.querySelectorAll('.map-btn')[1].classList.add('active');
        } else {
            map.removeLayer(satelliteLayer);
            map.removeLayer(labelsLayer);
            streetLayer.addTo(map);
            document.querySelectorAll('.map-btn')[0].classList.add('active');
        }
        currentLayer = type;
    }

    // ========== HOUSTON DISTANCE RINGS ==========
    const ringDistances = [
        { radius: 16000, label: '~15 דקות' },
        { radius: 32000, label: '~30 דקות' },
        { radius: 48000, label: '~45 דקות' }
    ];

    // Downtown Houston highlight
    L.circle(HOUSTON_CENTER, {
        radius: 5000,
        color: '#e94560',
        fillColor: '#e94560',
        fillOpacity: 0.08,
        weight: 2,
        opacity: 0.5
    }).addTo(map);

    // Houston city label
    L.marker([HOUSTON_CENTER[0] - 0.05, HOUSTON_CENTER[1]], {
        icon: L.divIcon({
            className: 'houston-label',
            html: 'HOUSTON · יוסטון',
            iconSize: [420, 52],
            iconAnchor: [210, 26]
        }),
        interactive: false
    }).addTo(map);

    ringDistances.forEach(ring => {
        L.circle(HOUSTON_CENTER, {
            radius: ring.radius,
            color: 'rgba(15, 52, 96, 0.25)',
            fillColor: 'transparent',
            fillOpacity: 0,
            weight: 1.5,
            dashArray: '8, 8'
        }).addTo(map);

        // Label at the top of each ring
        const labelLat = HOUSTON_CENTER[0] + (ring.radius / 111320);
        L.marker([labelLat, HOUSTON_CENTER[1]], {
            icon: L.divIcon({
                className: 'ring-label',
                html: ring.label,
                iconSize: [60, 16],
                iconAnchor: [30, 8]
            }),
            interactive: false
        }).addTo(map);
    });

    // ========== DRIVING TIME LINES ==========
    communities.forEach(c => {
        const line = L.polyline(
            [HOUSTON_CENTER, [c.lat, c.lng]],
            {
                color: c.color,
                weight: 2.5,
                opacity: 0.6,
                dashArray: '8, 6'
            }
        ).addTo(map);

        // Drive time label at midpoint
        const midLat = (HOUSTON_CENTER[0] + c.lat) / 2;
        const midLng = (HOUSTON_CENTER[1] + c.lng) / 2;
        L.marker([midLat, midLng], {
            icon: L.divIcon({
                className: 'drive-label',
                html: `🚗 ${c.driveTime}`,
                iconSize: [90, 22],
                iconAnchor: [45, 11]
            }),
            interactive: false
        }).addTo(map);
    });

    // ========== COMMUNITY MARKERS ==========
    function createCommunityIcon(color) {
        return L.divIcon({
            className: 'custom-marker',
            html: `<div style="
                width: 28px; height: 28px;
                background: ${color};
                border: 3px solid #fff;
                border-radius: 50%;
                box-shadow: 0 2px 8px rgba(0,0,0,0.4);
                display: flex; align-items: center; justify-content: center;
            "><div style="width:8px;height:8px;background:#fff;border-radius:50%;"></div></div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14],
            popupAnchor: [0, -16]
        });
    }

    const communityMarkers = {};

    communities.forEach(c => {
        const marker = L.marker([c.lat, c.lng], { icon: createCommunityIcon(c.color) })
            .addTo(map)
            .bindPopup(`
                <div class="popup-header">
                    <h3>${c.name} (${c.nameHe})</h3>
                    <div class="sub">${c.area} · ${c.builder} · 🚗 ${c.driveTime} למרכז</div>
                </div>
                <div class="popup-body">
                    <p>${c.description}</p>
                    <div class="info-row"><span class="label">שכונות</span><span class="value">${c.communities}</span></div>
                    <div class="info-row"><span class="label">טווח מחירים</span><span class="value">${c.priceRange}</span></div>
                    <div class="info-row"><span class="label">מחוז בתי ספר</span><span class="value">${c.schoolDistrict}</span></div>
                    <div class="info-row"><span class="label">נקודות עניין</span><span class="value">${c.highlights.join(', ')}</span></div>
                    <div class="popup-links">
                        <a class="lennar-link" href="${c.url}" target="_blank">צפה ב-Lennar.com ←</a>
                        <button class="aerial-btn" onclick="openAerial('${c.id}')">📸 צילום אווירי</button>
                    </div>
                </div>
            `, { maxWidth: 340 });

        communityMarkers[c.id] = marker;

        // Community name label above marker
        L.marker([c.lat + 0.018, c.lng], {
            icon: L.divIcon({
                className: 'community-label',
                html: c.name,
                iconSize: [200, 30],
                iconAnchor: [100, 15]
            }),
            interactive: false
        }).addTo(map);

        // Subtle circle around community
        L.circle([c.lat, c.lng], {
            radius: 3000,
            color: c.color,
            fillColor: c.color,
            fillOpacity: 0.08,
            weight: 1.5,
            opacity: 0.4
        }).addTo(map);
    });

    // ========== AERIAL PHOTO MODAL ==========
    let aerialMap = null;

    function openAerial(communityId) {
        const c = communities.find(x => x.id === communityId);
        if (!c) return;

        document.getElementById('aerialTitle').textContent = `📸 ${c.name} (${c.nameHe}) - תצוגת לוויין`;
        document.getElementById('aerialFooter').textContent = c.aerialNote;
        document.getElementById('aerialOverlay').classList.add('active');

        // Destroy old map if exists
        if (aerialMap) {
            aerialMap.remove();
            aerialMap = null;
        }

        // Use aerial-specific coordinates if available, otherwise fall back to main coords
        const aLat = c.aerialLat || c.lat;
        const aLng = c.aerialLng || c.lng;

        // Create mini satellite map
        setTimeout(() => {
            aerialMap = L.map('aerial-map', {
                center: [aLat, aLng],
                zoom: c.aerialZoom,
                zoomControl: true
            });

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri',
                maxZoom: 19
            }).addTo(aerialMap);

            // Add labels overlay
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(aerialMap);

            // Add marker at the aerial coordinates
            L.marker([aLat, aLng], { icon: createCommunityIcon(c.color) }).addTo(aerialMap);

            // Add smaller radius for zoomed-in view
            L.circle([aLat, aLng], {
                radius: 500,
                color: c.color,
                fillColor: c.color,
                fillOpacity: 0.1,
                weight: 2,
                dashArray: '6, 4'
            }).addTo(aerialMap);
        }, 100);
    }

    function closeAerial() {
        document.getElementById('aerialOverlay').classList.remove('active');
        if (aerialMap) {
            aerialMap.remove();
            aerialMap = null;
        }
    }

    // Close modal on overlay click
    document.getElementById('aerialOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeAerial();
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeAerial();
    });

    // ========== EMPLOYER MARKERS ==========
    function createEmployerIcon(icon) {
        return L.divIcon({
            className: 'employer-marker',
            html: `<div style="
                width: 42px; height: 42px;
                background: #e67e22;
                border: 3px solid #fff;
                border-radius: 8px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.45);
                display: flex; align-items: center; justify-content: center;
                font-size: 22px;
            ">${icon}</div>`,
            iconSize: [42, 42],
            iconAnchor: [21, 21],
            popupAnchor: [0, -24]
        });
    }

    employers.forEach(emp => {
        L.marker([emp.lat, emp.lng], { icon: createEmployerIcon(emp.icon) })
            .addTo(map)
            .bindPopup(`
                <div class="popup-header" style="background:linear-gradient(135deg, #e67e22, #d35400);">
                    <h3>${emp.icon} ${emp.name}</h3>
                    <div class="sub">${emp.nameHe} · ${emp.type}</div>
                </div>
                <div class="popup-body">
                    <p>${emp.desc}</p>
                </div>
            `, { maxWidth: 300 });

        // Employer name label on map
        L.marker([emp.lat + 0.02, emp.lng], {
            icon: L.divIcon({
                className: 'employer-label',
                html: emp.name,
                iconSize: [200, 28],
                iconAnchor: [100, 14]
            }),
            interactive: false
        }).addTo(map);
    });

    // ========== LANDMARK MARKERS ==========
    function createLandmarkIcon() {
        return L.divIcon({
            className: 'landmark-marker',
            html: `<div style="
                width: 18px; height: 18px;
                background: #3498db;
                border: 2px solid #fff;
                border-radius: 50%;
                box-shadow: 0 1px 4px rgba(0,0,0,0.3);
                opacity: 0.8;
            "></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9],
            popupAnchor: [0, -12]
        });
    }

    landmarks.forEach(lm => {
        L.marker([lm.lat, lm.lng], { icon: createLandmarkIcon() })
            .addTo(map)
            .bindPopup(`<div style="padding:8px;font-size:14px;font-weight:600;">${lm.icon} ${lm.name}</div>`, { maxWidth: 200 });
    });

    // ========== SIDEBAR - COMMUNITIES ==========
    const listEl = document.getElementById('community-list');
    communities.forEach(c => {
        const card = document.createElement('div');
        card.className = 'community-card';
        card.dataset.id = c.id;
        card.innerHTML = `
            <h3><span class="dot" style="background:${c.color}"></span>${c.name}</h3>
            <div class="area">${c.area} · ${c.schoolDistrict}</div>
            <div class="drive-time">🚗 ${c.driveTime} ממרכז יוסטון</div>
            <div class="details">${c.description.substring(0, 100)}...</div>
            <span class="tag">${c.priceRange}</span>
            <span class="tag">${c.builder}</span>
        `;
        card.addEventListener('click', () => {
            document.querySelectorAll('.community-card').forEach(el => el.classList.remove('active'));
            card.classList.add('active');
            map.flyTo([c.lat, c.lng], 13, { duration: 1 });
            communityMarkers[c.id].openPopup();
        });
        listEl.appendChild(card);
    });

    // ========== SIDEBAR - EMPLOYERS ==========
    const empListEl = document.getElementById('employer-list');
    employers.forEach(emp => {
        const item = document.createElement('div');
        item.className = 'landmark-item';
        item.innerHTML = `<span class="icon">${emp.icon}</span><span style="direction:rtl">${emp.nameHe}</span>`;
        item.addEventListener('click', () => {
            map.flyTo([emp.lat, emp.lng], 13, { duration: 1 });
        });
        empListEl.appendChild(item);
    });

    // ========== SIDEBAR - LANDMARKS ==========
    const lmListEl = document.getElementById('landmark-list');
    landmarks.forEach(lm => {
        const item = document.createElement('div');
        item.className = 'landmark-item';
        item.innerHTML = `<span class="icon">${lm.icon}</span>${lm.name}`;
        item.addEventListener('click', () => {
            map.flyTo([lm.lat, lm.lng], 13, { duration: 1 });
        });
        lmListEl.appendChild(item);
    });
    </script>
</body>
</html>
