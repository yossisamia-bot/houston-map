            color: #fff;

            text-align: center;

            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            line-height: 1.2;
            pointer-events: none;
        }

        /* Ring labels */
        .ring-label {

            color: rgba(15, 52, 96, 0.45);
            font-size: 11px;
            font-weight: 600;

            left: -420px;

            border: none;
            color: #aaa;

            margin-bottom: 8px;

            justify-content: center;

            color: #aaa;

        .res-card .res-date {

            color: #666;
            margin-top: 8px;
        }
        .res-card .res-arrow {

            color: #e94560;
            font-size: 18px;
            margin-top: -20px;
        }

            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            max-height: 500px;
            background: #000;
        }
        .res-card .res-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #1877f2;
            text-decoration: none;

        /* Search bar */

            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 18px;
            color: #555;
            display: flex;

            border: none;

            cursor: pointer;
            font-size: 16px;
            color: #999;
            display: none;

        .search-results {

            top: 46px;
            left: 50%;

            border-radius: 12px;

            overflow-y: auto;

            align-items: center;
            gap: 8px;

        .search-result-item .result-icon { font-size: 16px; flex-shrink: 0; }
        .search-result-item .result-text { flex: 1; min-width: 0; }
        .search-result-item .result-name { font-weight: 600; }
        .search-result-item .result-detail { font-size: 11px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

            background: #f39c12;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
            font-weight: 600;

            right: 12px;
            z-index: 999;
            background: #fff;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;

        .sv-map-btn:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
        .sv-map-btn.active { background: #f39c12; color: #fff; }

            position: absolute;
            bottom: 80px;
            right: 8px;
            z-index: 999;
            background: rgba(26,26,46,0.9);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            direction: rtl;
        }
        .sv-tooltip.active { display: block; }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #map { height: 100vh; }

            /* Map labels - smaller for mobile */
            .community-label { font-size: 14px; }
            .employer-label { font-size: 9px; padding: 2px 6px; }

            /* Map controls */
            .map-btn { padding: 5px 10px; font-size: 11px; }
            .map-controls { top: 8px; right: 8px; gap: 4px; }

            /* Aerial modal */
            .aerial-modal { width: 95vw; }
            .aerial-modal-header h3 { font-size: 13px; }
            #aerial-map { height: 280px; }
            .aerial-modal-footer { font-size: 11px; padding: 8px 12px; }

            /* Resources panel mobile */
            #resources-panel { width: 100vw; max-width: 100vw; left: -105vw; }
            #resources-btn { bottom: 16px; left: 16px; width: 46px; height: 46px; font-size: 20px; }

            /* Search bar mobile */
            .search-container { width: 240px; max-width: calc(100vw - 160px); }
            .search-container input { padding: 8px 10px; font-size: 12px; }
            .search-results { width: 280px; max-width: calc(100vw - 40px); }
            .sv-map-btn { width: 38px; height: 38px; font-size: 18px; bottom: 24px; }
        }
    </style>
</head>

            <button class="map-btn active" onclick="setLayer('street')">מפה</button>
            <button class="map-btn" onclick="setLayer('satellite')">לוויין</button>
        </div>

        <!-- Search bar -->
        <div class="search-container">
            <button class="search-btn" onclick="doSearch()" title="Search">🔍</button>
            <input type="text" id="searchInput" placeholder="Search address or street..." autocomplete="off"
                   onkeydown="if(event.key==='Enter')doSearch()" oninput="onSearchInput()">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
        </div>
        <div class="search-results" id="searchResults"></div>

        <!-- Street View button -->
        <button class="sv-map-btn" id="svBtn" onclick="toggleStreetViewMode()" title="Street View">🚶</button>
        <div class="sv-tooltip" id="svTooltip">לחץ על המפה לפתיחת Street View</div>
    </div>

    <!-- Resources Button & Panel -->
    <button id="resources-btn" onclick="toggleResources()" title="תוכן ומידע למשקיעים">
        📰
        <span class="badge-count" id="res-count"></span>

    <div id="resources-overlay" onclick="toggleResources()"></div>
    <div id="resources-panel">
        <div class="res-header">
            <h2>📰 תוכן למשקיעים</h2>
            <button class="res-close" onclick="toggleResources()">&times;</button>

    // ========== AERIAL PHOTO MODAL ==========
    let aerialMap = null;

    function openAerial(communityId) {
        const c = communities.find(x => x.id === communityId);
        if (!c) return;
        gtag('event', 'aerial_view', { community_name: c.name, community_id: communityId });

        document.getElementById('aerialTitle').textContent = `📸 ${c.name} (${c.nameHe}) - תצוגת לוויין`;
        document.getElementById('aerialFooter').textContent = c.aerialNote;
        document.getElementById('aerialOverlay').classList.add('active');

        // Destroy old map if exists
        if (aerialMap) {
            aerialMap.remove();
            aerialMap = null;
        }

        // Use aerial-specific coordinates if available, otherwise fall back to main coords
        const aLat = c.aerialLat || c.lat;
        const aLng = c.aerialLng || c.lng;

        // Create mini satellite map
        setTimeout(() => {
            aerialMap = L.map('aerial-map', {
                center: [aLat, aLng],
                zoom: c.aerialZoom,
                zoomControl: true
            });

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri',
                maxZoom: 19
            }).addTo(aerialMap);

            // Add labels overlay
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(aerialMap);

            // Add marker at the aerial coordinates
            L.marker([aLat, aLng], { icon: createCommunityIcon(c.color) }).addTo(aerialMap);

            // Add smaller radius for zoomed-in view
            L.circle([aLat, aLng], {
                radius: 500,
                color: c.color,
                fillColor: c.color,
                fillOpacity: 0.1,
                weight: 2,
                dashArray: '6, 4'
            }).addTo(aerialMap);
        }, 100);
    }

        document.getElementById('aerialOverlay').classList.remove('active');

            aerialMap = null;
        }

                    <div style="margin-bottom:8px"><strong>${fd.status}</strong> · ${fd.cost}</div>
                    <p>${fd.desc}</p>
                    <div style="margin-top:8px">${fd.highlights.map(h => `<span style="display:inline-block;background:#8e44ad22;color:#8e44ad;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px">${h}</span>`).join('')}</div>
                </div>
            `, { maxWidth: 350 });

        // Label on map
        L.marker([fd.lat, fd.lng], {
            icon: L.divIcon({
                className: 'employer-label',
                html: `<div style="white-space:nowrap;font-size:12px;font-weight:700;color:#8e44ad;text-shadow:1px 1px 3px #fff,-1px -1px 3px #fff,1px -1px 3px #fff,-1px 1px 3px #fff;pointer-events:none">${fd.name}<br><span style="font-size:10px;font-weight:400;opacity:0.85">${fd.status.split('·')[0].trim()}</span></div>`,
                iconSize: [120, 30],
                iconAnchor: [60, -12]
            })
        }).addTo(map);
    });

    // ========== RESOURCES / CONTENT FOR INVESTORS ==========
    const resources = [
        {
            title: 'How Geography Made The US Unstoppable.',
            desc: '',
            source: 'facebook',
            url: 'https://www.facebook.com/reel/2300816357112757',
            video: 'videos/video1.mp4',
            date: '2026-03-22'
        },
        {
            title: 'How Texas Is Becoming America\'s Most Powerful State.',
            desc: '',
            source: 'facebook',
            url: 'https://www.facebook.com/reel/2207217716683715',
            video: 'videos/video2.mp4',
            date: '2026-03-22'
        },
        {
            title: 'הצמיחה של יוסטון - חברות גדולות ושוק הדיור',
            desc: '',
            source: 'facebook',
            url: '',
            video: 'videos/video3.mp4',
            date: '2026-03-22'
        }
    ];

    const sourceConfig = {
        facebook:  { icon: 'f', label: 'Facebook', cls: 'facebook' },
        instagram: { icon: '📷', label: 'Instagram', cls: 'instagram' },
        youtube:   { icon: '▶', label: 'YouTube', cls: 'youtube' },
        article:   { icon: '📄', label: 'כתבה', cls: 'article' }
    };

    function renderResources() {
        const list = document.getElementById('resources-list');
        document.getElementById('res-count').textContent = resources.length;

        if (resources.length === 0) {
            list.innerHTML = '<div class="res-empty-hint">עדיין אין תוכן. יתווסף בקרוב!</div>';
            return;
        }

        list.innerHTML = resources.map(r => {
            const src = sourceConfig[r.source] || sourceConfig.article;
            const videoHtml = r.video
                ? `<video controls preload="metadata" playsinline><source src="${r.video}" type="video/mp4"></video>`
                : '';
            const linkHtml = r.url
                ? `<a class="res-link" href="${r.url}" target="_blank">🔗 צפה במקור</a>`
                : '';
            const descHtml = r.desc ? `<div class="res-desc">${r.desc}</div>` : '';
            return `
                <div class="res-card">
                    <div class="res-card-body">
                        <div class="res-card-source">
                            <span class="src-icon ${src.cls}">${src.icon}</span>
                            ${src.label}
                        </div>
                        <h3>${r.title}</h3>
                        ${videoHtml}
                        ${descHtml}
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div class="res-date">📅 ${r.date}</div>
                            ${linkHtml}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function toggleResources() {
        const panel = document.getElementById('resources-panel');
        const overlay = document.getElementById('resources-overlay');
        const isOpen = panel.classList.contains('open');
        if (!isOpen) gtag('event', 'resources_open');
        if (isOpen) {
            panel.classList.remove('open');
            overlay.classList.remove('active');
        } else {
            panel.classList.add('open');
            overlay.classList.add('active');
        }
    }

    renderResources();

    // ========== SEARCH ==========
    let searchMarker = null;
    let searchTimeout = null;

    function onSearchInput() {
        const val = document.getElementById('searchInput').value;
        document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
        // Live search after 400ms pause
        clearTimeout(searchTimeout);
        if (val.length >= 3) {
            searchTimeout = setTimeout(() => doSearch(), 400);
        } else {
            document.getElementById('searchResults').classList.remove('active');
        }
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').classList.remove('visible');
        document.getElementById('searchResults').classList.remove('active');
        if (searchMarker) { map.removeLayer(searchMarker); searchMarker = null; }
    }

    async function doSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;
        gtag('event', 'map_search', { search_term: query });

        const resultsEl = document.getElementById('searchResults');
        resultsEl.innerHTML = '<div style="padding:12px;text-align:center;color:#888;font-size:13px;">🔍 Searching...</div>';
        resultsEl.classList.add('active');

        try {
            // Search near Houston area
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', Houston, TX')}&limit=6&addressdetails=1&viewbox=-96.0,-95.0,29.5,30.3&bounded=0`;
            const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
            const data = await resp.json();

            if (data.length === 0) {
                resultsEl.innerHTML = '<div style="padding:16px;text-align:center;color:#888;font-size:13px;">No results found</div>';
                return;
            }

            resultsEl.innerHTML = data.map((item, i) => {
                const name = item.display_name.split(',').slice(0, 3).join(', ');
                const type = item.type || '';
                return `<div class="search-result-item" onclick="goToResult(${item.lat}, ${item.lon}, '${item.display_name.replace(/'/g, "\\'")}')">
                    <span class="result-icon">📍</span>
                    <div class="result-text">
                        <div class="result-name">${name}</div>
                        <div class="result-detail">${type}</div>
                    </div>
                    <span class="sv-mini" onclick="event.stopPropagation();openSV(${item.lat},${item.lon})">SV</span>
                </div>`;
            }).join('');
        } catch (err) {
            resultsEl.innerHTML = '<div style="padding:16px;text-align:center;color:#c0392b;font-size:13px;">Search error. Try again.</div>';
        }
    }

    function goToResult(lat, lng, name) {
        document.getElementById('searchResults').classList.remove('active');

        if (searchMarker) map.removeLayer(searchMarker);

        map.flyTo([lat, lng], 16, { duration: 1 });

        searchMarker = L.marker([lat, lng], {
            icon: L.divIcon({
                className: '',
                html: `<div style="
                    width:32px;height:32px;background:#e94560;border:3px solid #fff;
                    border-radius:50%;box-shadow:0 3px 12px rgba(0,0,0,0.4);
                    display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;
                ">📍</div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16],
                popupAnchor: [0, -18]
            })
        }).addTo(map);

        const shortName = name.split(',').slice(0, 2).join(', ');
        searchMarker.bindPopup(`
            <div class="popup-header" style="background:linear-gradient(135deg,#e94560,#c0392b);">
                <h3>📍 ${shortName}</h3>
            </div>
            <div class="popup-body" style="text-align:center;padding:12px;">
                <button onclick="openSV(${lat},${lng})" style="
                    background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;
                    border:none;padding:8px 18px;border-radius:8px;cursor:pointer;
                    font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
                ">🚶 Street View</button>
                <button onclick="openGoogleMaps(${lat},${lng})" style="
                    background:linear-gradient(135deg,#16213e,#0f3460);color:#fff;
                    border:none;padding:8px 18px;border-radius:8px;cursor:pointer;
                    font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
                    margin-top:6px;
                ">🗺️ Google Maps</button>
            </div>
        `, { maxWidth: 260 }).openPopup();
    }

    // ========== STREET VIEW ==========
    function openSV(lat, lng) {
        window.open(`https://www.google.com/maps/@${lat},${lng},3a,75y,0h,90t/data=!3m6!1e1!3m4!1s!2e0!7i16384!8i8192`, '_blank');
    }

    function openGoogleMaps(lat, lng) {
        window.open(`https://www.google.com/maps/@${lat},${lng},17z`, '_blank');
    }

    // Street View click mode
    let svMode = false;
    function toggleStreetViewMode() {
        svMode = !svMode;
        if (svMode) gtag('event', 'streetview_toggle');
        document.getElementById('svBtn').classList.toggle('active', svMode);
        document.getElementById('svTooltip').classList.toggle('active', svMode);
        document.getElementById('map').style.cursor = svMode ? 'crosshair' : '';

        if (svMode) {
            // Auto-hide tooltip after 3s
            setTimeout(() => {
                document.getElementById('svTooltip').classList.remove('active');
            }, 3000);
        }
    }

    map.on('click', function(e) {
        if (svMode) {
            openSV(e.latlng.lat, e.latlng.lng);
            // Don't exit mode - user might want to click multiple spots
        }
    });

    // Close search results when clicking elsewhere
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-container') && !e.target.closest('.search-results')) {
            document.getElementById('searchResults').classList.remove('active');
        }
    });

    </script>
</body>
</html>
